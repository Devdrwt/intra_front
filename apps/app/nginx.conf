server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Assets fingerprintés (hash dans le nom) : cache long & immutable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html jamais mis en cache (pour toujours récupérer les derniers hash d'assets)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback (react-router : toutes les routes -> index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
