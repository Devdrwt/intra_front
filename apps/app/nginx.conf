server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # En-têtes de sécurité (rappelés dans chaque location qui pose ses propres
    # add_header, car nginx n'hérite PAS des add_header parents dès qu'un
    # add_header local est présent).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Content-Security-Policy. connect-src/img-src couvrent l'API (api.drwintech.com)
    # et le fond du login (images.pexels.com). 'unsafe-inline' uniquement pour les
    # styles (attributs style React) ; les scripts sont strictement 'self'
    # (l'anti-flash thème est externalisé dans /theme-init.js). L'iframe email
    # (srcdoc sandboxé) est couverte par default-src 'self'.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; worker-src 'self'; manifest-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://api.drwintech.com https://api.open-meteo.com; frame-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;

    # Compression
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Assets fingerprintés (hash dans le nom) : cache long & immutable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # index.html jamais mis en cache (pour toujours récupérer les derniers hash d'assets)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; worker-src 'self'; manifest-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://api.drwintech.com https://api.open-meteo.com; frame-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;
    }

    # Manifest PWA : bon type MIME (hérite des en-têtes de sécurité du server).
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    # Service worker : jamais mis en cache (pour récupérer les mises à jour).
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; worker-src 'self'; manifest-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://api.drwintech.com https://api.open-meteo.com; frame-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;
    }

    # SPA fallback (react-router : toutes les routes -> index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
