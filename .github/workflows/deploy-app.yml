name: Deploy App

on:
  push:
    branches: [main]
    paths:
      - 'apps/app/**'
      - 'packages/ui/**'
      - 'package-lock.json'
      - 'docker-compose.app.prod.yml'
      - '.github/workflows/deploy-app.yml'
  workflow_dispatch:

concurrency:
  group: deploy-app-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/devdrwt/intra_front

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || 'https://api.drwintech.com/api/v1' }}

  deploy:
    needs: build
    # Runner auto-hébergé SUR le VPS → déploiement local, sans SSH entrant.
    runs-on: self-hosted
    steps:
      - name: Deploy on VPS (local)
        run: |
          set -e
          cd /opt/intra-app
          git pull --ff-only
          docker compose pull app
          docker compose up -d
          docker image prune -f
